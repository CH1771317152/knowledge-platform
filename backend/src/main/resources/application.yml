server:
  port: 8080

management:
  health:
    elasticsearch:
      enabled: false

spring:
  application:
    name: knowledge-platform
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3307/knowledge_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: knowledge-platform
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.platform

platform:
  storage:
    provider: ${STORAGE_PROVIDER:aliyun-oss}
    endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    region: ${OSS_REGION:cn-hangzhou}
    bucket: ${OSS_BUCKET:knowledge-platform-dev-2026}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    presign-expire-minutes: ${OSS_PRESIGN_EXPIRE_MINUTES:10}
  content:
    id:
      worker-id: ${CONTENT_ID_WORKER_ID:1}
      datacenter-id: ${CONTENT_ID_DATACENTER_ID:1}
    kafka:
      events-topic: ${CONTENT_EVENTS_TOPIC:content-events}
  cache:
    caffeine:
      maximum-size: ${LOCAL_CACHE_MAXIMUM_SIZE:10000}
      expire-after-write-seconds: ${LOCAL_CACHE_EXPIRE_SECONDS:300}
    feed:
      l2:
        head-ttl-seconds: ${FEED_L2_HEAD_TTL_SECONDS:5}
        cursor-ttl-seconds: ${FEED_L2_CURSOR_TTL_SECONDS:60}
        max-size: ${FEED_L2_MAX_SIZE:10000}
      l1:
        head-ttl-seconds: ${FEED_L1_HEAD_TTL_SECONDS:4}
        cursor-ttl-seconds: ${FEED_L1_CURSOR_TTL_SECONDS:120}
      l0:
        ttl-seconds: ${FEED_L0_TTL_SECONDS:300}
      jitter-ratio: ${FEED_JITTER_RATIO:0.3}
      reconciliation-interval-ms: ${FEED_RECONCILIATION_INTERVAL_MS:30000}
      single-flight-lock-wait-ms: ${FEED_SINGLE_FLIGHT_LOCK_WAIT_MS:200}
      single-flight-lock-ttl-seconds: ${FEED_SINGLE_FLIGHT_LOCK_TTL_SECONDS:10}
      hot-key:
        enabled: ${FEED_HOT_KEY_ENABLED:true}
        window-seconds: ${FEED_HOT_KEY_WINDOW_SECONDS:60}
        slice-seconds: ${FEED_HOT_KEY_SLICE_SECONDS:10}
        max-tracked-keys: ${FEED_HOT_KEY_MAX_TRACKED_KEYS:50000}
        cold-threshold-ratio: ${FEED_HOT_KEY_COLD_THRESHOLD_RATIO:0.5}
        low-threshold: ${FEED_HOT_KEY_LOW_THRESHOLD:50}
        high-threshold: ${FEED_HOT_KEY_HIGH_THRESHOLD:200}
        base-ttl-seconds: ${FEED_HOT_KEY_BASE_TTL_SECONDS:30}
        medium-extra-ttl-seconds: ${FEED_HOT_KEY_MEDIUM_EXTRA_TTL_SECONDS:60}
        high-extra-ttl-seconds: ${FEED_HOT_KEY_HIGH_EXTRA_TTL_SECONDS:120}
        jitter-min-seconds: ${FEED_HOT_KEY_JITTER_MIN_SECONDS:5}
        jitter-max-seconds: ${FEED_HOT_KEY_JITTER_MAX_SECONDS:10}
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:knowledge-platform}
      secret: ${AUTH_JWT_SECRET:change-this-development-secret-change-this}
      access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token:
      ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:1209600}
      bytes: ${AUTH_REFRESH_TOKEN_BYTES:48}
    verification:
      code-ttl-seconds: ${AUTH_VERIFICATION_CODE_TTL_SECONDS:300}
      resend-interval-seconds: ${AUTH_VERIFICATION_RESEND_INTERVAL_SECONDS:60}
      hourly-send-limit: ${AUTH_VERIFICATION_HOURLY_SEND_LIMIT:5}
      max-failed-attempts: ${AUTH_VERIFICATION_MAX_FAILED_ATTEMPTS:5}
      code-length: ${AUTH_VERIFICATION_CODE_LENGTH:6}
    sender:
      mode: ${AUTH_VERIFICATION_SENDER_MODE:logging}
      expose-code-in-logs: ${AUTH_VERIFICATION_EXPOSE_CODE_IN_LOGS:true}
  relation:
    kafka:
      events-topic: ${RELATION_EVENTS_TOPIC:relation-events}
      follower-retry-topic: ${RELATION_FOLLOWER_RETRY_TOPIC:relation-follower-retry}
      follower-dlq-topic: ${RELATION_FOLLOWER_DLQ_TOPIC:relation-follower-dlq}
      follower-consumer-group: ${RELATION_FOLLOWER_CONSUMER_GROUP:relation-follower-projector-group}
      follower-retry-consumer-group: ${RELATION_FOLLOWER_RETRY_CONSUMER_GROUP:relation-follower-retry-group}
  counter:
    kafka:
      events-topic: ${COUNTER_EVENTS_TOPIC:counter-events}
      retry-topic: ${COUNTER_RETRY_TOPIC:counter-retry}
      dlq-topic: ${COUNTER_DLQ_TOPIC:counter-dlq}
      consumer-group: ${COUNTER_CONSUMER_GROUP:counter-aggregate-group}
      retry-consumer-group: ${COUNTER_RETRY_CONSUMER_GROUP:counter-aggregate-retry-group}
      relation-consumer-group: ${COUNTER_RELATION_CONSUMER_GROUP:counter-relation-group}
      content-events-topic: ${CONTENT_EVENTS_TOPIC:content-events}
      content-consumer-group: ${COUNTER_CONTENT_CONSUMER_GROUP:counter-content-group}
      snapshot-topic: ${COUNTER_SNAPSHOT_TOPIC:counter-snapshot-events}
      snapshot-consumer-group: ${COUNTER_SNAPSHOT_CONSUMER_GROUP:counter-snapshot-relay-group}
    flush:
      mode: ${COUNTER_FLUSH_MODE:adaptive}
      fixed-interval-ms: ${COUNTER_FLUSH_FIXED_MS:1000}
      min-interval-ms: ${COUNTER_FLUSH_MIN_MS:500}
      max-interval-ms: ${COUNTER_FLUSH_MAX_MS:5000}
      batch-size: ${COUNTER_FLUSH_BATCH:1000}
  search:
    enabled: ${SEARCH_ENABLED:false}
    index:
      read-alias: ${SEARCH_INDEX_READ_ALIAS:knowledge-posts-read}
      write-alias: ${SEARCH_INDEX_WRITE_ALIAS:knowledge-posts-write}
      initial-index: ${SEARCH_INDEX_INITIAL:knowledge-posts-v1}
      body-max-chars: ${SEARCH_BODY_MAX_CHARS:50000}
      oss-read-timeout-ms: ${SEARCH_OSS_READ_TIMEOUT_MS:3000}
      oss-max-concurrency: ${SEARCH_OSS_MAX_CONCURRENCY:8}
    cursor:
      secret: ${SEARCH_CURSOR_SECRET:change-this-search-cursor-secret}
      ttl-seconds: ${SEARCH_CURSOR_TTL_SECONDS:600}
    rank:
      title-boost: ${SEARCH_RANK_TITLE_BOOST:5.0}
      description-boost: ${SEARCH_RANK_DESCRIPTION_BOOST:2.0}
      body-boost: ${SEARCH_RANK_BODY_BOOST:1.0}
      favorite-weight: ${SEARCH_RANK_FAVORITE_WEIGHT:3.0}
      like-weight: ${SEARCH_RANK_LIKE_WEIGHT:2.0}
      view-weight: ${SEARCH_RANK_VIEW_WEIGHT:0.2}
      recency-weight: ${SEARCH_RANK_RECENCY_WEIGHT:1.0}
    kafka:
      content-consumer-group: ${SEARCH_CONTENT_CONSUMER_GROUP:search-content-indexer-group}
      content-retry-topic: ${SEARCH_CONTENT_RETRY_TOPIC:search-content-retry}
      content-dlq-topic: ${SEARCH_CONTENT_DLQ_TOPIC:search-content-dlq}
      counter-snapshot-topic: ${COUNTER_SNAPSHOT_TOPIC:counter-snapshot-events}
      counter-consumer-group: ${SEARCH_COUNTER_CONSUMER_GROUP:search-counter-snapshot-group}
      counter-retry-topic: ${SEARCH_COUNTER_RETRY_TOPIC:search-counter-retry}
      counter-dlq-topic: ${SEARCH_COUNTER_DLQ_TOPIC:search-counter-dlq}
    rebuild:
      scan-batch-size: ${SEARCH_REBUILD_SCAN_BATCH:500}
      bulk-batch-size: ${SEARCH_REBUILD_BULK_BATCH:200}
