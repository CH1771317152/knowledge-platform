# application-local.yml — 本地开发运行时 profile
# 用法：./mvnw.cmd spring-boot:run '-Dspring-boot.run.profiles=local'
#
# 这个 profile 的职责：让应用连上 Docker 基础设施（MySQL/Redis/Kafka/ES），
# 同时启用所有 @Profile("!test & !integration") 的 Kafka 消费者和定时任务。
#
# 对比：
# - test profile：无外部依赖，纯单元测试
# - integration profile：连 MySQL+Redis 但不启动 Kafka 消费者/调度器（测试隔离）
# - local profile：连全部基础设施 + 启动全部消费者/调度器（完整运行时）
# - prod profile：生产环境（需自行创建，配置外部化）

spring:
  # HikariCP 连接池（默认 10 对高并发太小）
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:30}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: ${HIKARI_CONN_TIMEOUT:5000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}

  # Redis Lettuce 连接池（默认无池，单连接多路复用，高并发下不够）
  data:
    redis:
      lettuce:
        pool:
          enabled: true
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
        shutdown-timeout: 200ms

  # Kafka Producer：开启幂等 + acks=all（outbox relay 的 send-then-mark 模式需要可靠投递）
  kafka:
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

# Tomcat 线程池（与 HikariCP 30 配对）
server:
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:200}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: 100
    max-connections: 8192

# 搜索：本地开发时如 ES 已启动（docker compose up elasticsearch）则开启
platform:
  search:
    enabled: ${SEARCH_ENABLED:false}  # 改为 true 前确保 ES 容器已启动 + IK 插件已装
